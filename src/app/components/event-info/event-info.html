<p class="text-lg" id="event-info">
  <span class="icon pi pi-calendar"></span><span>{{ content()?.DATE }}</span><br>
  <span class="icon pi pi-map-marker"></span><span>{{ content()?.VENUE }}</span><br>
  @if (content()?.COCKTAIL) {
    <span class="icon pi pi-clock"></span><span>{{ content()?.COCKTAIL }}</span><br>
  }
  <span class="icon pi pi-clock"></span><span>{{ content()?.TIME }}</span>
</p>
<p class="text-base">
  {{ content()?.WELCOME }}
</p>
<p class="text-base">
  <span class="icon pi pi-instagram"></span><span>#LifeIsJasOkWithYou</span><br>
</p>
