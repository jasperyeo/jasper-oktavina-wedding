<audio loop id="music-player">
  <source [src]="content()?.BG_MUSIC_PATH" type="audio/mp3">
</audio>

<p-button (click)="toggleMusic()" [raised]="true" rounded
  [class.pulse]="isPlaying()" severity="secondary">
  <span pButtonLabel>
    @if (isPlaying()) {
      🔊
    } @else {
      🔇
    }
  </span>
</p-button>
