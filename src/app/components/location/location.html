<h1 class="text-5xl">
  {{ content()?.TITLE }}
</h1>
<p class="text-lg">
  <span class="icon pi pi-map-marker"></span><span>{{ content()?.NAME }}</span><br>
</p>
<p class="text-sm">
  <span class="icon pi pi-map-marker"></span>
  <a href="{{ content()?.GMAP_URL }}" target="_blank" rel="noopener noreferrer">
    {{ content()?.GMAP_ADDRESS }}
  </a>
</p>
@if (enableEmbed()) {
  @if (appService.country() === 'id') {
    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3989.3198804328495!2d104.442568!3d0.9056742!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31d972f248abaccd%3A0xc30518322a2cd904!2sSam&#39;s%20Anna%20Seafood!5e0!3m2!1sen!2ssg!4v1754929043793!5m2!1sen!2ssg"
      [title]="content()?.GMAP_TITLE" width="100%" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  } @else if (appService.country() === 'sg') {
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3988.771453892597!2d103.85179827597999!3d1.3125510616924996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31da19c677cf7f6f%3A0xc21ef0b48ffd7759!2sOne%20Farrer%20Hotel!5e0!3m2!1sen!2ssg!4v1760855877714!5m2!1sen!2ssg"
      [title]="content()?.GMAP_TITLE" width="100%" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  }
}
